services:
  init:
    container_name: init-moca
    image: "mocachain/moca"
    environment:
      MOCA_DOCKERUP_DATA_DIR: /app/.local
    networks:
      - moca-network
    volumes:
      - "./deployment/dockerup/:/app/scripts:rw"
      - local-env:/app/.local
    working_dir: "/app/scripts"
    command: >
      bash -c " rm -f init_done && bash localup.sh init 4 0 && bash localup.sh generate 4 0 && bash localup.sh copy_genesis && bash localup.sh persistent_peers && bash localup.sh export_validator 4 > validator.json && touch init_done && sleep infinity "
    healthcheck:
      test: [ "CMD-SHELL", "test -f /app/scripts/init_done && echo 'OK' || exit 1" ]
      interval: 60s
      retries: 10
    restart: "on-failure"
  vnode-0:
    container_name: mocad-validator-0
    depends_on:
      init:
        condition: service_healthy
    image: "mocachain/moca"
    networks:
      - moca-network
    ports:
      - "28750:28750"
      - "27750:27750"
      - "9090:9090"
      - "1317:1317"
      - "26657:26657"
      - "8545:8545"
      - "8546:8546"
    volumes:
      - "local-env:/app"
    command: >
      bash -c " mkdir -p ~/.mocad && cp -r /app/validator0/* ~/.mocad/ && mocad start --keyring-backend test --api.enabled-unsafe-cors true --address 0.0.0.0:28750 --grpc.address 0.0.0.0:9090 --p2p.laddr tcp://0.0.0.0:27750 --p2p.external-address 0.0.0.0:27750 --rpc.laddr tcp://0.0.0.0:26657 --rpc.unsafe true --json-rpc.address 0.0.0.0:8545 --json-rpc.ws-address 0.0.0.0:8546 --log_format json "
  vnode-1:
    container_name: mocad-validator-1
    depends_on:
      init:
        condition: service_healthy
    image: "mocachain/moca"
    networks:
      - moca-network
    ports:
      - "28751:28750"
      - "27751:27750"
      - "9091:9090"
      - "1318:1317"
      - "26658:26657"
      - "8547:8545"
      - "8548:8546"
    volumes:
      - "local-env:/app"
    command: >
      bash -c " mkdir -p ~/.mocad && cp -r /app/validator1/* ~/.mocad/ && mocad start --keyring-backend test --api.enabled-unsafe-cors true --address 0.0.0.0:28750 --grpc.address 0.0.0.0:9090 --p2p.laddr tcp://0.0.0.0:27750 --p2p.external-address 0.0.0.0:27750 --rpc.laddr tcp://0.0.0.0:26657 --rpc.unsafe true --json-rpc.address 0.0.0.0:8545 --json-rpc.ws-address 0.0.0.0:8546 --log_format json "
  vnode-2:
    container_name: mocad-validator-2
    depends_on:
      init:
        condition: service_healthy
    image: "mocachain/moca"
    networks:
      - moca-network
    ports:
      - "28752:28750"
      - "27752:27750"
      - "9092:9090"
      - "1319:1317"
      - "26659:26657"
      - "8549:8545"
      - "8550:8546"
    volumes:
      - "local-env:/app"
    command: >
      bash -c " mkdir -p ~/.mocad && cp -r /app/validator2/* ~/.mocad/ && mocad start --keyring-backend test --api.enabled-unsafe-cors true --address 0.0.0.0:28750 --grpc.address 0.0.0.0:9090 --p2p.laddr tcp://0.0.0.0:27750 --p2p.external-address 0.0.0.0:27750 --rpc.laddr tcp://0.0.0.0:26657 --rpc.unsafe true --json-rpc.address 0.0.0.0:8545 --json-rpc.ws-address 0.0.0.0:8546 --log_format json "
  vnode-3:
    container_name: mocad-validator-3
    depends_on:
      init:
        condition: service_healthy
    image: "mocachain/moca"
    networks:
      - moca-network
    ports:
      - "28753:28750"
      - "27753:27750"
      - "9093:9090"
      - "1320:1317"
      - "26660:26657"
      - "8551:8545"
      - "8552:8546"
    volumes:
      - "local-env:/app"
    command: >
      bash -c " mkdir -p ~/.mocad && cp -r /app/validator3/* ~/.mocad/ && mocad start --keyring-backend test --api.enabled-unsafe-cors true --address 0.0.0.0:28750 --grpc.address 0.0.0.0:9090 --p2p.laddr tcp://0.0.0.0:27750 --p2p.external-address 0.0.0.0:27750 --rpc.laddr tcp://0.0.0.0:26657 --rpc.unsafe true --json-rpc.address 0.0.0.0:8545 --json-rpc.ws-address 0.0.0.0:8546 --log_format json "
volumes:
  local-env:
networks:
  moca-network:
    external: true
