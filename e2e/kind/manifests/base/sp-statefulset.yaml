apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sp
  namespace: moca-e2e
  labels:
    app: storage-provider
spec:
  serviceName: sp-headless
  replicas: 1
  selector:
    matchLabels:
      app: storage-provider
  template:
    metadata:
      labels:
        app: storage-provider
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: moca-sp
          # Image must be set via MOCA_SP_IMAGE env var or overlay patch
          image: mocafoundation/moca-sp:latest
          imagePullPolicy: Never
          command: ["moca-sp"]
          args:
            - -log.std
            - -c
            - /config/config.toml
            - -server
            - approver,authenticator,downloader,taskexecutor,gateway,manager,p2p,receiver,signer,uploader
          ports:
            - name: grpc
              containerPort: 9033
            - name: gateway
              containerPort: 9333
            - name: p2p-external
              containerPort: 9933
            - name: metrics
              containerPort: 24367
            - name: pprof
              containerPort: 24368
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: sp-0-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
